<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Chain Reaction" />
  <meta name="description" content="A compound word chain puzzle game" />
  <title>Chain Reaction</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- AUTH SCREEN -->
  <div id="screen-auth" class="screen active">
    <div class="auth-wrap">
      <div class="auth-logo">
        <h1>Chain Reaction</h1>
        <p class="auth-tagline">compound word chain puzzle</p>
      </div>

      <div id="auth-tabs" class="auth-tabs">
        <button class="auth-tab active" data-tab="signin">sign in</button>
        <button class="auth-tab" data-tab="signup">sign up</button>
      </div>

      <div id="auth-error" class="auth-error hidden"></div>

      <form id="auth-form" class="auth-form" autocomplete="on">
        <input type="email" id="auth-email" placeholder="email address" autocomplete="email" required />
        <input type="password" id="auth-password" placeholder="password" autocomplete="current-password" required />
        <input type="text" id="auth-name" placeholder="display name" class="hidden" autocomplete="name" />
        <button type="submit" class="btn btn-primary" id="auth-submit">sign in</button>
      </form>

      <div class="auth-divider"><span>or</span></div>

      <button class="btn btn-google" id="btn-google">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        continue with Google
      </button>

      <button class="btn btn-ghost" id="btn-guest">play as guest</button>
    </div>
  </div>

  <!-- MAIN GAME SCREEN -->
  <div id="screen-game" class="screen">

    <!-- Top nav -->
    <header class="top-bar">
      <button class="icon-btn" id="btn-stats-open" title="stats">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 20V10M12 20V4M6 20v-6"/>
        </svg>
      </button>
      <div class="top-title">
        <span class="top-game-title">Chain Reaction</span>
      </div>
      <button class="icon-btn" id="btn-profile-open" title="profile">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      </button>
    </header>

    <!-- Mode selector -->
    <div class="mode-row">
      <button class="mode-btn active-easy" id="mode-easy">easy</button>
      <button class="mode-btn" id="mode-hard">hard</button>
    </div>

    <!-- Stats bar -->
    <div class="stats-row">
      <div class="stat" id="stat-hints-wrap">
        <div class="stat-val hints" id="stat-hints">3</div>
        <div class="stat-lbl">hints left</div>
      </div>
      <div class="stat">
        <div class="wrong-pips" id="wrong-pips"></div>
        <div class="stat-lbl" style="margin-top:6px">wrong guesses</div>
      </div>
      <div class="stat">
        <div class="stat-val score" id="stat-score">0/6</div>
        <div class="stat-lbl">solved</div>
      </div>
    </div>

    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <div id="message" class="message"></div>

    <!-- Theme badge -->
    <div class="theme-badge-wrap">
      <span class="theme-badge" id="theme-badge"> </span>
    </div>

    <!-- Chain -->
    <div class="chain" id="chain"></div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-row">
        <input type="text" class="word-input" id="word-input" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" />
        <button class="btn btn-submit" id="btn-submit">Enter</button>
      </div>
      <div class="status-row">
        <span class="current-clue" id="current-clue">—</span>
        <span id="word-counter"></span>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button class="btn btn-hint" id="btn-hint">
        <span class="hint-pip" id="hpip1"></span>
        <span class="hint-pip" id="hpip2"></span>
        <span class="hint-pip" id="hpip3"></span>
        hint
      </button>
      <button class="btn btn-new" id="btn-new">new game</button>
    </div>

    <input style="position:absolute;opacity:0;width:1px;height:1px;pointer-events:none" id="hidden-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" />

  </div>

  <!-- STATS MODAL -->
  <div id="modal-stats" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2>your stats</h2>
        <button class="icon-btn" id="btn-stats-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-big" id="ms-attempted">0</div>
            <div class="stat-name">attempted</div>
          </div>
          <div class="stat-card">
            <div class="stat-big" id="ms-completed">0</div>
            <div class="stat-name">completed</div>
          </div>
          <div class="stat-card">
            <div class="stat-big" id="ms-avg-attempts">—</div>
            <div class="stat-name">avg wrong / win</div>
          </div>
          <div class="stat-card">
            <div class="stat-big" id="ms-streak">0</div>
            <div class="stat-name">streak</div>
          </div>
          <div class="stat-card">
            <div class="stat-big" id="ms-best-streak">0</div>
            <div class="stat-name">best streak</div>
          </div>
          <div class="stat-card">
            <div class="stat-big" id="ms-hints">0</div>
            <div class="stat-name">hints used</div>
          </div>
        </div>

        <div class="stats-section">
          <div class="stats-section-title">mode breakdown</div>
          <div class="mode-stats-row">
            <div class="mode-stat-block easy-block">
              <div class="mode-label">easy</div>
              <div class="mode-nums"><span id="ms-easy-completed">0</span>W / <span id="ms-easy-attempted">0</span>P</div>
            </div>
            <div class="mode-stat-block hard-block">
              <div class="mode-label">hard</div>
              <div class="mode-nums"><span id="ms-hard-completed">0</span>W / <span id="ms-hard-attempted">0</span>P</div>
            </div>
          </div>
        </div>

        <div class="stats-section">
          <div class="stats-section-title">recent games</div>
          <div id="recent-games-list" class="recent-games"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- PROFILE MODAL -->
  <div id="modal-profile" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2>profile</h2>
        <button class="icon-btn" id="btn-profile-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="profile-info">
          <div class="profile-avatar" id="profile-avatar">?</div>
          <div class="profile-details">
            <div class="profile-name" id="profile-name">Guest</div>
            <div class="profile-email" id="profile-email">not signed in</div>
          </div>
        </div>
        <div id="profile-actions">
          <button class="btn btn-primary" id="btn-signin-from-profile">sign in to save stats</button>
        </div>
        <div id="signout-actions" class="hidden">
          <button class="btn btn-ghost btn-danger" id="btn-signout">sign out</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script src="js/config.js"></script>
  <script src="js/puzzles.js"></script>
  <script src="js/game.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
